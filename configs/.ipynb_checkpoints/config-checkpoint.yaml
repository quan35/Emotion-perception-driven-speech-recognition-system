audio:
  sample_rate: 16000
  max_duration: 5.0 # seconds
  min_duration: 0.5
  n_mels: 128
  n_mfcc: 40
  hop_length: 512
  n_fft: 2048

emotion:
  labels: ["happy", "angry", "sad", "neutral", "fear", "surprise"]
  label2id:
    happy: 0
    angry: 1
    sad: 2
    neutral: 3
    fear: 4
    surprise: 5
  num_classes: 6

model:
  whisper_size: "small"
  cnn_channels: [32, 64, 128]
  lstm_hidden: 128
  lstm_layers: 2
  attention_dim: 64
  dropout: 0.1
  classifier_hidden: 128
  classifier_dropout: 0.2

shared_model:
  variant: "transformer_head"
  checkpoint_format: 2
  training_mode: "cached_sequence" # "live_encoder" "cached_sequence"
  pooling: "attention"
  norm: "layernorm" # "derf" "dyt" "layernorm"
  freeze_strategy: "freeze_all" # "freeze_all" "unfreeze_last_2" "unfreeze_last_4"
  head_layers: 2
  head_hidden_dim: 768
  num_heads: 8
  ff_mult: 4
  dropout: 0.2
  classifier_hidden: 256
  attention_pool_hidden: 256
  cached_sequence_head_layers: 1
  cached_sequence_ff_mult: 1
  cached_sequence_classifier_hidden: 128
  cached_sequence_attention_pool_hidden: 128
  legacy_hidden_dims: [256, 64]
  cache_feature_dtype: "float16"

training:
  batch_size: 256
  whisper_feature_batch_size: 64
  whisper_feature_num_workers: 8
  whisper_feature_prefetch_factor: 2
  live_encoder_batch_size: 16
  live_encoder_eval_batch_size: 16
  live_encoder_num_workers: 8
  live_encoder_eval_num_workers: 8
  live_encoder_prefetch_factor: 4
  live_encoder_eval_prefetch_factor: 4
  live_encoder_persistent_workers: true
  live_encoder_eval_persistent_workers: true
  epochs: 100
  learning_rate: 0.0002
  head_learning_rate: 0.0002
  encoder_learning_rate: 0.00002
  weight_decay: 0.0001
  patience: 10
  scheduler_patience: 5
  scheduler_factor: 0.5
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  best_metric: "subset_mean_uar"
  protocol_version: 2
  main_subsets: ["ravdess", "casia", "esd", "emodb", "iemocap"]
  auxiliary_subsets: ["tess"]
  seed_sweep: [42, 52, 62]
  subset_sampling_mode: "balanced_class_aware"
  subset_sampling_with_replacement: true
  subset_class_balance_power: 0.5
  subset_epoch_targets:
    casia: 900
    emodb: 700
    esd: 2000
    iemocap: 2200
    ravdess: 1200
  subset_epoch_caps:
    casia: 900
    emodb: 700
    esd: 2000
    iemocap: 2200
    ravdess: 1200
    tess: 2000
  esd_epoch_cap: 2000
  label_smoothing: 0.05
  warmup_epochs: 3
  live_encoder_head_learning_rate: 0.0001
  live_encoder_encoder_learning_rate: 0.00002
  live_encoder_weight_decay: 0.0002
  live_encoder_scheduler_patience: 3
  live_encoder_patience: 8
  live_encoder_label_smoothing: 0.02
  live_encoder_focal_loss: true
  live_encoder_focal_gamma: 1.5
  cached_sequence_esd_epoch_cap: 4000
  cached_sequence_dropout: 0.45
  cached_sequence_head_learning_rate: 0.00003
  cached_sequence_weight_decay: 0.002
  cached_sequence_label_smoothing: 0.12
  cached_sequence_warmup_epochs: 5
  cached_sequence_patience: 4
  cached_sequence_scheduler_patience: 2
  cached_sequence_scheduler_factor: 0.5
  live_encoder_time_mask_max: 24
  live_encoder_freq_mask_max: 12
  live_encoder_noise_std: 0.01
  cached_sequence_feature_dropout: 0.1
  cached_sequence_time_mask_max: 8
  cached_sequence_feature_mask_max: 48
  cached_sequence_noise_std: 0.005
  focal_loss: false
  focal_gamma: 2.0

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  features: "data/features"
  checkpoints: "checkpoints"
  best_emotion_model: "checkpoints/best_emotion.pth"
  best_shared_model: "checkpoints/shared_transformer_head_live_encoder_attention_derf_unfreeze_last_2.pth"
  # "checkpoints/shared_transformer_head_live_encoder_attention_derf_freeze_all.pth"
  # "checkpoints/shared_transformer_head_live_encoder_attention_dyt_freeze_all.pth"
  # "checkpoints/shared_transformer_head_live_encoder_attention_layernorm_freeze_all.pth"
  # "checkpoints/shared_transformer_head_live_encoder_attention_derf_unfreeze_last_2.pth"

datasets:
  ravdess:
    emotions:
      "01": "neutral"
      "02": "neutral" # calm -> neutral
      "03": "happy"
      "04": "sad"
      "05": "angry"
      "06": "fear"
      "07": "surprise" # disgust -> surprise (remap)
      "08": "surprise"
  casia:
    emotions:
      "surprise": "surprise"
      "sad": "sad"
      "neutral": "neutral"
      "happy": "happy"
      "fear": "fear"
      "angry": "angry"
  tess:
    emotions:
      "angry": "angry"
      "disgust": "surprise"
      "fear": "fear"
      "happy": "happy"
      "neutral": "neutral"
      "pleasant_surprise": "surprise"
      "ps": "surprise"
      "sad": "sad"
  esd:
    emotions:
      "Angry": "angry"
      "Happy": "happy"
      "Neutral": "neutral"
      "Sad": "sad"
      "Surprise": "surprise"
  emodb:
    emotions:
      "W": "angry" # Wut (anger)
      "A": "fear" # Angst (fear)
      "F": "happy" # Freude (joy)
      "T": "sad" # Trauer (sadness)
      "N": "neutral" # Neutral
      "L": "neutral" # Langeweile (boredom) -> neutral
      "E": "surprise" # Ekel (disgust) -> surprise (align with existing remap)
  iemocap:
    emotions:
      "ang": "angry" # anger
      "hap": "happy" # happiness
      "exc": "happy" # excited -> happy
      "sad": "sad" # sadness
      "neu": "neutral" # neutral
      "fru": "angry" # frustration -> angry
      "fea": "fear" # fear
      "sur": "surprise" # surprise
      "dis": "surprise" # disgust -> surprise
