audio:
  sample_rate: 16000
  max_duration: 5.0 # seconds
  min_duration: 0.5
  n_mels: 128
  n_mfcc: 40
  hop_length: 512
  n_fft: 2048

emotion:
  labels: ["happy", "angry", "sad", "neutral", "fear", "surprise"]
  label2id:
    happy: 0
    angry: 1
    sad: 2
    neutral: 3
    fear: 4
    surprise: 5
  num_classes: 6

model:
  whisper_size: "small"
  cnn_channels: [32, 64, 128]
  lstm_hidden: 128
  lstm_layers: 2
  attention_dim: 64
  dropout: 0.1
  classifier_hidden: 128
  classifier_dropout: 0.2

shared_model:
  variant: "transformer_head"
  checkpoint_format: 2
  training_mode: "live_encoder"
  pooling: "attention"
  norm: "derf" # "dyt" "layernorm"
  freeze_strategy: "freeze_all"
  head_layers: 2
  head_hidden_dim: 768
  num_heads: 8
  ff_mult: 4
  dropout: 0.1
  classifier_hidden: 256
  attention_pool_hidden: 256
  legacy_hidden_dims: [256, 64]
  cache_feature_dtype: "float16"

training:
  batch_size: 256
  whisper_feature_batch_size: 64
  whisper_feature_num_workers: 8
  whisper_feature_prefetch_factor: 2
  epochs: 100
  learning_rate: 0.0005
  weight_decay: 0.00001
  patience: 15
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  label_smoothing: 0.0
  warmup_epochs: 3
  focal_loss: false
  focal_gamma: 2.0

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  features: "data/features"
  checkpoints: "checkpoints"
  best_emotion_model: "checkpoints/best_emotion.pth"
  best_shared_model: "checkpoints/shared_transformer_head_live_encoder_attention_derf_freeze_all.pth"
  # "checkpoints/shared_transformer_head_live_encoder_attention_derf_freeze_all.pth"
  # "checkpoints/shared_transformer_head_live_encoder_attention_dyt_freeze_all.pth"
  # "checkpoints/shared_transformer_head_live_encoder_attention_layernorm_freeze_all.pth"
  # "checkpoints/shared_transformer_head_live_encoder_attention_derf_unfreeze_last_2.pth"

datasets:
  ravdess:
    emotions:
      "01": "neutral"
      "02": "neutral" # calm -> neutral
      "03": "happy"
      "04": "sad"
      "05": "angry"
      "06": "fear"
      "07": "surprise" # disgust -> surprise (remap)
      "08": "surprise"
  casia:
    emotions:
      "surprise": "surprise"
      "sad": "sad"
      "neutral": "neutral"
      "happy": "happy"
      "fear": "fear"
      "angry": "angry"
  tess:
    emotions:
      "angry": "angry"
      "disgust": "surprise"
      "fear": "fear"
      "happy": "happy"
      "neutral": "neutral"
      "pleasant_surprise": "surprise"
      "ps": "surprise"
      "sad": "sad"
  esd:
    emotions:
      "Angry": "angry"
      "Happy": "happy"
      "Neutral": "neutral"
      "Sad": "sad"
      "Surprise": "surprise"
  emodb:
    emotions:
      "W": "angry" # Wut (anger)
      "A": "fear" # Angst (fear)
      "F": "happy" # Freude (joy)
      "T": "sad" # Trauer (sadness)
      "N": "neutral" # Neutral
      "L": "neutral" # Langeweile (boredom) -> neutral
      "E": "surprise" # Ekel (disgust) -> surprise (align with existing remap)
  iemocap:
    emotions:
      "ang": "angry" # anger
      "hap": "happy" # happiness
      "exc": "happy" # excited -> happy
      "sad": "sad" # sadness
      "neu": "neutral" # neutral
      "fru": "angry" # frustration -> angry
      "fea": "fear" # fear
      "sur": "surprise" # surprise
      "dis": "surprise" # disgust -> surprise
